version: '3.8'

services:
  postgres:
    image: postgres:17
    container_name: modal-db
    environment:
      POSTGRES_DB: modaldb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  tika:
    image: apache/tika:latest
    container_name: modal-tika
    ports:
      - "9998:9998"
    restart: always

volumes:
  postgres_data:
    driver: local