name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    uses: ./.github/workflows/test.yml

  build:
    needs: test
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

          - os: macos-latest
            target: x86_64-apple-darwin

          - os: macos-latest
            target: aarch64-apple-darwin

          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ubuntu system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Angular frontend  # ← ADD THIS
        run: npm run build

      - name: DEBUG - Check Angular build output
        shell: bash
        run: |
          echo "=== Checking if dist exists ==="
          ls -la dist/ || echo "❌ No dist directory!"
          echo ""
          echo "=== Checking dist/modal ==="
          ls -la dist/modal/ || echo "❌ No dist/modal directory!"
          echo ""
          echo "=== Checking dist/modal/browser ==="
          ls -la dist/modal/browser/ || echo "❌ No dist/modal/browser directory!"
          echo ""
          echo "=== Looking for index.html ==="
          find dist -name "index.html" -type f || echo "❌ No index.html found anywhere in dist!"
          echo ""
          echo "=== Full dist tree ==="
          find dist -type f || echo "❌ Cannot list dist tree"

      - name: DEBUG - Show tauri.conf.json build section
        shell: bash
        run: |
          echo "=== tauri.conf.json build configuration ==="
          cat src-tauri/tauri.conf.json | grep -A 10 '"build"' || cat src-tauri/tauri.conf.json

      - name: DEBUG - Verify files before Tauri build
        shell: bash
        run: |
          echo "=== Checking from src-tauri perspective ==="
          cd src-tauri
          ls -la ../dist/modal/browser/ || echo "❌ Cannot see frontend from src-tauri!"
          test -f ../dist/modal/browser/index.html && echo "✅ index.html exists!" || echo "❌ index.html NOT found!"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install Python dependencies and PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install .
        working-directory: python

      - name: Bundle Python features
        run: python bundle.py
        working-directory: python

      - name: Verify executables were created  # ← Add this
        shell: bash
        run: |
          echo "=== Checking python/dist/ ==="
          ls -la python/dist/
          echo "=== File types ==="
          file python/dist/* || true

      - name: Determine if prerelease
        id: prerelease
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *"alpha"* ]] || [[ "$TAG" == *"beta"* ]] || [[ "$TAG" == *"rc"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MODAL ${{ github.ref_name }}'
          releaseBody: |
            ## MODAL ${{ github.ref_name }}

            ### Downloads
            - **Windows**: `.msi` or `.exe` installer
            - **macOS (Intel)**: `_x64.dmg`
            - **macOS (Apple Silicon)**: `_aarch64.dmg`
            - **Linux**: `.AppImage` or `.deb`

            ### Requirements
            - **Database**: PostgreSQL 14+ (use the provided `docker-compose.yml`)
              1. Run `docker-compose up -d` to start the database
              2. Run `alembic upgrade head` on first install (see DATABASE_SETUP.md)

            ### What's New
            See [CHANGELOG.md](CHANGELOG.md) for full release notes.
          releaseDraft: false
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          args: --target ${{ matrix.target }}
