name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ubuntu system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Angular frontend
        run: npm run build

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install Python dependencies and PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install .
        working-directory: python

      - name: Bundle Python features
        run: python bundle.py
        working-directory: python

      - name: DEBUG - Check if executables were created
        shell: bash
        run: |
          echo "=== PWD ==="
          pwd
          echo ""
          echo "=== Does python/dist exist? ==="
          ls -la python/ || echo "No python/ directory!"
          echo ""
          echo "=== Contents of python/dist ==="
          ls -la python/dist/ || echo "No python/dist/ directory!"
          echo ""
          echo "=== Find all dist directories ==="
          find . -name "dist" -type d
          echo ""
          echo "=== Find all executables ==="
          find . -type f -executable -name "create_new_archive" -o -name "get_archive_overview"
          echo ""
          echo "=== Check from src-tauri perspective ==="
          cd src-tauri
          ls -la ../python/dist/ || echo "Cannot see ../python/dist/ from src-tauri!"

      - name: Run frontend tests (placeholder)
        run: echo "Frontend tests not yet implemented"

      - name: Run Rust tests (placeholder)
        run: echo "Rust tests not yet implemented"

      - name: Run Python tests (placeholder)
        run: echo "Python tests not yet implemented"
